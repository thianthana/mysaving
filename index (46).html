<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F8FAFC">
<title>My Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8FAFC;
  --surface:#FFFFFF;
  --surface-2:#F1F5F9;
  --border:#E2E8F0;
  --border-light:#F1F5F9;
  --text:#0F172A;
  --text-2:#475569;
  --muted:#94A3B8;
  --primary:#6366F1;
  --primary-soft:#EEF2FF;
  --success:#10B981;
  --success-soft:#ECFDF5;
  --danger:#EF4444;
  --danger-soft:#FEF2F2;
  --warning:#F59E0B;
  --warning-soft:#FEF3C7;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 12px rgba(15,23,42,.06);
  --shadow-lg:0 10px 30px rgba(15,23,42,.08);
  --font:'Plus Jakarta Sans','IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;min-height:100vh;font-feature-settings:"cv11"}
input,select,button,textarea{font-family:inherit;border:none;outline:none}
input:focus,select:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
::-webkit-scrollbar{display:none}
button{cursor:pointer}

.app{max-width:430px;margin:0 auto;padding-bottom:90px;min-height:100vh;position:relative}

/* ─── Top toast ─── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;transition:transform .3s cubic-bezier(.22,1,.36,1);max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* ─── Loading ─── */
.loading{position:fixed;inset:0;background:rgba(248,250,252,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:150}
.loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Setup screen ─── */
.setup{padding:32px 24px;text-align:center;max-width:380px;margin:60px auto}
.setup-icon{font-size:48px;margin-bottom:16px}
.setup h2{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em}
.setup p{font-size:14px;color:var(--text-2);line-height:1.6;margin-bottom:24px}
.setup-code{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:12px;font-family:monospace;color:var(--text-2);text-align:left;margin-bottom:20px;word-break:break-all}
.setup-btn{background:var(--primary);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;border:none}

/* ─── Header ─── */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.hdr-greet{font-size:13px;color:var(--text-2);font-weight:500}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.hdr-btn{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow-sm)}

/* ─── Pills ─── */
.pills{display:flex;gap:8px;padding:18px 20px 0;overflow-x:auto}
.pill{flex:0 0 auto;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;background:var(--surface);color:var(--text-2);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.pill.active{color:#fff;border-color:transparent;transform:scale(1.02)}
.pill-add{flex:0 0 auto;padding:10px 16px;border-radius:24px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:600}

/* ─── Balance Card ─── */
.bal{margin:16px 20px;border-radius:24px;padding:26px 24px 22px;position:relative;overflow:hidden;color:#fff;box-shadow:var(--shadow-lg)}
.bal-deco1{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.12)}
.bal-deco2{position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;border-radius:45px;background:rgba(255,255,255,.08)}
.bal-inner{position:relative;z-index:1}
.bal-label{font-size:12px;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.02em}
.bal-amount{font-size:34px;font-weight:800;margin-top:6px;letter-spacing:-.03em;line-height:1}
.bal-row{display:flex;gap:24px;margin-top:18px}
.bal-sub-label{font-size:10px;color:rgba(255,255,255,.65);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.bal-sub-val{font-size:15px;font-weight:700;margin-top:2px}
.bal-bar{margin-top:16px;height:6px;border-radius:3px;background:rgba(255,255,255,.2);overflow:hidden}
.bal-bar-fill{height:100%;border-radius:3px;background:rgba(255,255,255,.85);transition:width .5s cubic-bezier(.22,1,.36,1)}
.bal-pct{font-size:10px;color:rgba(255,255,255,.65);margin-top:5px;text-align:right;font-weight:500}

/* ─── Action buttons ─── */
.actions{display:flex;gap:10px;margin:0 20px 20px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;background:var(--surface);color:var(--text);font-size:13px;font-weight:600;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all .15s}
.act-btn:active{transform:scale(.97)}
.act-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;font-size:13px}

/* ─── Section ─── */
.section{padding:0 20px;margin-bottom:24px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:16px;font-weight:700;letter-spacing:-.01em}
.section-sub{font-size:12px;color:var(--muted);font-weight:500}

/* ─── Box grid ─── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:var(--surface);border-radius:18px;padding:16px 14px;border:1px solid var(--border);position:relative;overflow:hidden;transition:all .15s;box-shadow:var(--shadow-sm)}
.box:active{transform:scale(.97)}
.box-accent{position:absolute;top:0;left:0;right:0;height:3px}
.box-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.box-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.box-del{background:var(--danger-soft);border:none;color:var(--danger);width:24px;height:24px;border-radius:8px;font-size:11px;display:flex;align-items:center;justify-content:center}
.box-name{font-size:12px;color:var(--text-2);margin-bottom:2px;font-weight:500}
.box-amt{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.box-bar{margin-top:10px;height:5px;border-radius:3px;background:var(--surface-2);overflow:hidden}
.box-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.box-pct{font-size:10px;color:var(--muted);margin-top:4px;font-weight:500}

/* ─── Empty state ─── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;background:var(--surface);border-radius:16px;border:1px dashed var(--border)}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.5}

/* ─── Transaction row ─── */
.tx{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border-radius:14px;margin-bottom:8px;border:1px solid var(--border-light);transition:all .15s}
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.tx-icon.in{background:var(--success-soft);color:var(--success)}
.tx-icon.out{background:var(--danger-soft);color:var(--danger)}
.tx-info{flex:1;min-width:0}
.tx-note{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amt{font-size:14px;font-weight:700;flex-shrink:0}
.tx-amt.in{color:var(--success)}
.tx-amt.out{color:var(--danger)}

/* ─── Bottom Nav ─── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:50;padding:8px 0 14px;box-shadow:0 -4px 20px rgba(15,23,42,.04)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:transparent;border:none;transition:color .15s}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600}
.nav-btn.active{color:var(--primary)}
.nav-btn:not(.active){color:var(--muted)}

/* ─── Sheet/Modal ─── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 -20px 60px rgba(15,23,42,.15)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;border-radius:3px;background:var(--border);margin:12px auto 4px}
.sheet-body{padding:16px 22px 32px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-.01em}

/* ─── Forms ─── */
.inp{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;box-sizing:border-box;transition:all .15s;font-family:inherit}
.inp-big{font-size:30px;font-weight:800;text-align:center;padding:20px;letter-spacing:-.03em;background:var(--surface-2);border-color:transparent}
.inp-unit{text-align:center;font-size:11px;color:var(--muted);margin:8px 0 16px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.lbl{font-size:11px;color:var(--text-2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;color:#fff;border:none;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(.98)}
.icon-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.icon-opt{width:44px;height:44px;border-radius:12px;font-size:22px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.icon-opt.active{border-color:var(--primary);background:var(--primary-soft);transform:scale(1.05)}
.color-grid{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.color-opt{width:36px;height:36px;border-radius:18px;border:3px solid transparent;transition:all .15s;position:relative}
.color-opt.active{border-color:#fff;box-shadow:0 0 0 2px var(--text)}
.tab-bar{display:flex;gap:4px;padding:4px;border-radius:14px;background:var(--surface-2);margin-bottom:18px}
.tab-btn{flex:1;padding:11px 0;border-radius:10px;font-size:13px;font-weight:600;text-align:center;background:transparent;color:var(--text-2);border:none;transition:all .2s}
.tab-btn.active{color:#fff;box-shadow:var(--shadow-sm)}

/* ─── Profile stats ─── */
.stat-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;background:var(--surface);border:1px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow-sm)}
.stat-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-label{font-size:11px;color:var(--text-2);font-weight:500}
.stat-val{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.pbar{height:7px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:6px;margin-bottom:16px}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* ─── Admin link card ─── */
.admin-link{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:16px;background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border:1px solid #C7D2FE;text-decoration:none;color:var(--primary);margin-top:20px;transition:all .15s}
.admin-link:active{transform:scale(.98)}
.admin-link-icon{width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.admin-link-text{flex:1}
.admin-link-title{font-size:14px;font-weight:700}
.admin-link-sub{font-size:11px;color:#6366F1;opacity:.8;margin-top:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .3s ease both}
</style>
</head>
<body>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<script src="config.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
const ICONS={tuition:"🎓",expense:"💳",food:"🍜",transport:"🚌",rent:"🏠",book:"📚",health:"💊",saving:"💰",phone:"📱",clothes:"👕",entertainment:"🎬",other:"📦"};
const ICON_KEYS=Object.keys(ICONS);
const EMOJIS=["🎓","🔬","🏦","💼","📊","🎯","🌟","💎","🚀","🔥","💰","📚"];
const COLORS=["#6366F1","#10B981","#F59E0B","#EF4444","#06B6D4","#8B5CF6","#EC4899","#14B8A6"];

const uid=()=>"id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const dtShort=d=>new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short"});

// ════════════════════════════════════════════════════════════
// API CLIENT
// ════════════════════════════════════════════════════════════
const SCRIPT_URL=window.APP_CONFIG?.SCRIPT_URL||"https://script.google.com/macros/s/AKfycbwHuIm3rKaMg-R_N9ZJlRnSJayEs1vQTxTzmB3pKIBeZh0_XFVBrKqHJnhFXT3VJmf2/exec";

function showLoading(show){document.getElementById("loading").classList.toggle("show",show);}
let toastTimer;
function toast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;requestAnimationFrame(()=>t.classList.add("show"));clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2500);}

async function apiGet(action){
  if(!SCRIPT_URL||SCRIPT_URL.includes("YOUR_DEPLOYMENT"))throw new Error("กรุณาตั้งค่า Google Apps Script URL ในไฟล์ config.js");
  const r=await fetch(SCRIPT_URL+"?action="+action);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||"เกิดข้อผิดพลาด");
  return j;
}

async function apiPost(action,payload){
  if(!SCRIPT_URL||SCRIPT_URL.includes("YOUR_DEPLOYMENT"))throw new Error("กรุณาตั้งค่า Google Apps Script URL ในไฟล์ config.js");
  const r=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...payload})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||"เกิดข้อผิดพลาด");
  return j;
}

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let data={accounts:[],history:[]};
let sel=0,page="home";

function acc(){return data.accounts[sel]||data.accounts[0];}

async function reload(){
  showLoading(true);
  try{
    const r=await apiGet("getAll");
    data=r.data;
    if(sel>=data.accounts.length)sel=Math.max(0,data.accounts.length-1);
  }catch(e){
    toast(e.message,"error");
    renderSetup(e.message);
    showLoading(false);
    return false;
  }
  showLoading(false);
  return true;
}

// ════════════════════════════════════════════════════════════
// ACTIONS (all online)
// ════════════════════════════════════════════════════════════
async function withApi(promise,successMsg){
  showLoading(true);
  try{
    await promise;
    await apiGet("getAll").then(r=>{data=r.data;});
    if(successMsg)toast(successMsg,"success");
    render();
  }catch(e){
    toast(e.message||"เกิดข้อผิดพลาด","error");
  }finally{
    showLoading(false);
  }
}

const actions={
  deposit:(amt)=>apiPost("deposit",{data:{accountId:acc().id,amount:amt,historyId:uid(),note:"เพิ่มเงินเข้าบัญชี"}}),
  addBox:(name,icon,amt)=>apiPost("addBox",{data:{id:uid(),accountId:acc().id,name,icon,amount:amt||0}}),
  removeBox:(boxId)=>apiPost("deleteBox",{id:boxId}),
  transact:(boxId,type,amt,note)=>apiPost("transact",{data:{boxId,type,amount:amt,note,historyId:uid()}}),
  transfer:(fromId,toId,amt)=>apiPost("transfer",{data:{fromId,toId,amount:amt}}),
  addAccount:()=>{const c=COLORS[data.accounts.length%COLORS.length];return apiPost("addAccount",{data:{id:uid(),name:"บัญชี "+(data.accounts.length+1),emoji:"💼",color:c,balance:0}});},
  updateAcc:(u)=>apiPost("updateAccount",{data:{id:acc().id,...u}}),
  deleteAcc:()=>apiPost("deleteAccount",{id:acc().id}),
};

// ════════════════════════════════════════════════════════════
// SETUP SCREEN
// ════════════════════════════════════════════════════════════
function renderSetup(msg){
  document.getElementById("app").innerHTML=`
    <div class="setup">
      <div class="setup-icon">⚙️</div>
      <h2>ต้องตั้งค่าก่อน</h2>
      <p>${msg||"กรุณาตั้งค่า Google Apps Script URL ในไฟล์ config.js ก่อน"}</p>
      <div class="setup-code">
        <strong>ขั้นตอน:</strong><br>
        1. สร้าง Google Sheet ใหม่<br>
        2. Extensions → Apps Script → วางโค้ดจาก google-apps-script.js<br>
        3. รัน setupSheets() ครั้งแรก<br>
        4. Deploy → Web app → Anyone<br>
        5. Copy URL → ใส่ใน config.js
      </div>
      <button class="setup-btn" onclick="location.reload()">ลองใหม่</button>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function render(){
  if(!data.accounts.length){
    document.getElementById("app").innerHTML=`
      <div class="setup">
        <div class="setup-icon">📭</div>
        <h2>ยังไม่มีบัญชี</h2>
        <p>เริ่มต้นด้วยการสร้างบัญชีแรกของคุณ</p>
        <button class="setup-btn" onclick="doAddAccount()">+ สร้างบัญชี</button>
      </div>`;
    return;
  }

  const app=document.getElementById("app");
  if(page==="home") app.innerHTML=renderHome();
  else if(page==="history") app.innerHTML=renderHistory();
  else if(page==="profile") app.innerHTML=renderProfile();
  app.innerHTML+=renderNav();
  bind();
}

function renderHome(){
  const a=acc();
  const boxSum=a.boxes.reduce((s,b)=>s+b.amount,0);
  const unalloc=a.balance-boxSum;
  const pct=a.balance>0?Math.min(boxSum/a.balance*100,100):0;
  const hist=data.history.filter(h=>h.accId===a.id).sort((x,y)=>new Date(y.date)-new Date(x.date)).slice(0,5);

  const pills=data.accounts.map((ac,i)=>`<button class="pill${i===sel?" active":""}" data-sel="${i}" ${i===sel?`style="background:${ac.color}"`:""}>${ac.emoji} ${ac.name}</button>`).join("")
    +`<button class="pill-add" data-action="addAccount">+ บัญชี</button>`;

  const boxes=a.boxes.map(b=>{
    const bp=a.balance>0?(b.amount/a.balance*100):0;
    return `<div class="box fade" data-boxid="${b.id}">
      <div class="box-accent" style="background:${a.color}"></div>
      <div class="box-top">
        <div class="box-icon" style="background:${a.color}1A;color:${a.color}">${ICONS[b.icon]||"📦"}</div>
        <button class="box-del" data-delbox="${b.id}">✕</button>
      </div>
      <div class="box-name">${b.name}</div>
      <div class="box-amt">฿${fmt(b.amount)}</div>
      <div class="box-bar"><div class="box-bar-fill" style="width:${Math.min(bp,100)}%;background:${a.color}"></div></div>
      <div class="box-pct">${bp.toFixed(0)}%</div>
    </div>`;
  }).join("");

  const txHtml=hist.map(h=>{
    const box=a.boxes.find(b=>b.id===h.boxId);
    return txRow(h,box?.name||"บัญชี","");
  }).join("");

  return `
    <div class="hdr">
      <div><div class="hdr-greet">สวัสดี 👋</div><div class="hdr-title">My Finance</div></div>
      <button class="hdr-btn" data-action="editAcc">⚙️</button>
    </div>
    <div class="pills">${pills}</div>
    <div class="bal fade" style="background:linear-gradient(135deg,${a.color},${shade(a.color,-15)})">
      <div class="bal-deco1"></div><div class="bal-deco2"></div>
      <div class="bal-inner">
        <div class="bal-label">ยอดเงินทั้งหมด</div>
        <div class="bal-amount">฿${fmt(a.balance)}</div>
        <div class="bal-row">
          <div><div class="bal-sub-label">จัดสรร</div><div class="bal-sub-val">฿${fmt(boxSum)}</div></div>
          <div><div class="bal-sub-label">คงเหลือ</div><div class="bal-sub-val">฿${fmt(unalloc)}</div></div>
        </div>
        <div class="bal-bar"><div class="bal-bar-fill" style="width:${pct}%"></div></div>
        <div class="bal-pct">${pct.toFixed(0)}% จัดสรรแล้ว</div>
      </div>
    </div>
    <div class="actions">
      <button class="act-btn" data-action="deposit"><span class="act-icon" style="background:var(--success-soft);color:var(--success)">↓</span> เพิ่มเงิน</button>
      <button class="act-btn" data-action="addBox"><span class="act-icon" style="background:var(--primary-soft);color:var(--primary)">+</span> สร้างกล่อง</button>
    </div>
    <div class="section">
      <div class="section-hdr"><span class="section-title">กล่องเงิน</span><span class="section-sub">${a.boxes.length} กล่อง</span></div>
      ${a.boxes.length>0?`<div class="grid">${boxes}</div>`:`<div class="empty"><div class="empty-icon">📦</div>ยังไม่มีกล่องเงิน<br>กด "สร้างกล่อง" เพื่อเริ่มต้น</div>`}
    </div>
    <div class="section">
      <div class="section-hdr"><span class="section-title">รายการล่าสุด</span></div>
      ${hist.length>0?txHtml:`<div class="empty">ยังไม่มีรายการ</div>`}
    </div>`;
}

function renderHistory(){
  const sorted=[...data.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html=sorted.map(h=>{
    const a=data.accounts.find(x=>x.id===h.accId);
    const box=a?.boxes.find(b=>b.id===h.boxId);
    return txRow(h,box?.name||"บัญชี",a?`${a.emoji} ${a.name} · `:"");
  }).join("");
  return `<div class="hdr"><div><div class="hdr-greet">📋 ประวัติ</div><div class="hdr-title">รายการทั้งหมด</div></div></div>
    <div style="padding:20px"><div class="section-sub" style="margin-bottom:14px">${data.history.length} รายการ</div>
    ${sorted.length>0?html:`<div class="empty"><div class="empty-icon">📋</div>ไม่มีรายการ</div>`}</div>`;
}

function renderProfile(){
  const tot=data.accounts.reduce((s,a)=>s+a.balance,0);
  const deps=data.history.filter(h=>h.type==="deposit").reduce((s,h)=>s+h.amount,0);
  const wds=data.history.filter(h=>h.type==="withdraw").reduce((s,h)=>s+h.amount,0);
  const stats=[
    {i:"💰",l:"ยอดรวม",v:"฿"+fmt(tot),c:"#6366F1"},
    {i:"📥",l:"เงินเข้าสะสม",v:"฿"+fmt(deps),c:"#10B981"},
    {i:"📤",l:"เงินออกสะสม",v:"฿"+fmt(wds),c:"#EF4444"},
    {i:"🏦",l:"จำนวนบัญชี",v:data.accounts.length,c:"#F59E0B"},
    {i:"📦",l:"กล่องทั้งหมด",v:data.accounts.reduce((s,a)=>s+a.boxes.length,0),c:"#06B6D4"},
  ];
  const shtml=stats.map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.c}1A;color:${s.c}">${s.i}</div><div style="flex:1"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div></div>`).join("");
  const bars=data.accounts.map(a=>{
    const p=tot>0?(a.balance/tot*100):0;
    return `<div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:600">${a.emoji} ${a.name}</span><span style="font-size:13px;font-weight:700;color:${a.color}">฿${fmt(a.balance)}</span></div><div class="pbar"><div class="pbar-fill" style="width:${p}%;background:${a.color}"></div></div></div>`;
  }).join("");
  return `<div class="hdr"><div><div class="hdr-greet">👤 โปรไฟล์</div><div class="hdr-title">สรุปภาพรวม</div></div></div>
    <div style="padding:20px">
      ${shtml}
      <div class="section-title" style="margin:24px 0 14px">สัดส่วนบัญชี</div>
      ${bars}
      <a href="admin.html" class="admin-link">
        <div class="admin-link-icon">🖥️</div>
        <div class="admin-link-text"><div class="admin-link-title">เปิด Admin Dashboard</div><div class="admin-link-sub">จัดการแบบเต็มรูปแบบบนคอมพิวเตอร์</div></div>
        <div style="font-size:20px;color:var(--primary)">→</div>
      </a>
    </div>`;
}

function txRow(h,boxName,prefix){
  const isIn=h.type==="deposit";
  return `<div class="tx">
    <div class="tx-icon ${isIn?"in":"out"}">${isIn?"↓":"↑"}</div>
    <div class="tx-info"><div class="tx-note">${h.note||"—"}</div><div class="tx-meta">${prefix}${boxName} · ${dtShort(h.date)}</div></div>
    <div class="tx-amt ${isIn?"in":"out"}">${isIn?"+":"-"}฿${fmt(h.amount)}</div>
  </div>`;
}

function renderNav(){
  const tabs=[{k:"home",i:"🏠",l:"หน้าหลัก"},{k:"history",i:"📋",l:"ประวัติ"},{k:"profile",i:"👤",l:"โปรไฟล์"}];
  return `<div class="nav">${tabs.map(t=>`<button class="nav-btn${page===t.k?" active":""}" data-page="${t.k}"><span class="nav-icon">${t.i}</span><span class="nav-label">${t.l}</span></button>`).join("")}</div>`;
}

// Color shade utility
function shade(hex,p){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+Math.round(2.55*p),g=((n>>8)&0xff)+Math.round(2.55*p),b=(n&0xff)+Math.round(2.55*p);
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}

// ════════════════════════════════════════════════════════════
// SHEETS / MODALS
// ════════════════════════════════════════════════════════════
let overlayEl;
function openSheet(html){
  if(!overlayEl){overlayEl=document.createElement("div");overlayEl.className="overlay";overlayEl.innerHTML=`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-body"></div></div>`;document.body.appendChild(overlayEl);overlayEl.addEventListener("click",e=>{if(e.target===overlayEl)closeSheet();});}
  overlayEl.querySelector(".sheet-body").innerHTML=html;
  requestAnimationFrame(()=>overlayEl.classList.add("open"));
}
function closeSheet(){if(overlayEl)overlayEl.classList.remove("open");}

function openDeposit(){
  const a=acc();
  openSheet(`<div class="sheet-title">เพิ่มเงินเข้าบัญชี</div>
    <input class="inp inp-big" type="number" inputmode="decimal" placeholder="0.00" id="sh-amt">
    <div class="inp-unit">บาท</div>
    <button class="btn" style="background:${a.color}" id="sh-submit">ยืนยันการเพิ่มเงิน</button>`);
  setTimeout(()=>{
    const el=document.getElementById("sh-amt");el?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{
      const n=Number(el.value);if(n>0){closeSheet();withApi(actions.deposit(n),"เพิ่มเงินสำเร็จ");}
    });
  },100);
}

function openAddBox(){
  let iconHtml=ICON_KEYS.map(k=>`<button class="icon-opt${k==="saving"?" active":""}" data-icon="${k}">${ICONS[k]}</button>`).join("");
  openSheet(`<div class="sheet-title">สร้างกล่องเงินใหม่</div>
    <div class="lbl">ชื่อกล่อง</div><input class="inp" placeholder="เช่น ค่าเทอม" id="sh-name" style="margin-bottom:14px">
    <div class="lbl">ไอคอน</div><div class="icon-grid" id="sh-icons">${iconHtml}</div>
    <div class="lbl">จำนวนเริ่มต้น (ไม่บังคับ)</div><input class="inp" type="number" inputmode="decimal" placeholder="0.00" id="sh-amt">
    <button class="btn" style="background:var(--primary);margin-top:18px" id="sh-submit">สร้างกล่อง</button>`);
  setTimeout(()=>{
    let selIcon="saving";
    document.getElementById("sh-icons")?.addEventListener("click",e=>{
      const b=e.target.closest("[data-icon]");if(!b)return;
      document.querySelectorAll(".icon-opt").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");selIcon=b.dataset.icon;
    });
    document.getElementById("sh-name")?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{
      const name=document.getElementById("sh-name").value.trim();
      if(name){closeSheet();withApi(actions.addBox(name,selIcon,Number(document.getElementById("sh-amt").value)||0),"สร้างกล่องสำเร็จ");}
    });
  },100);
}

function openEditAcc(){
  const a=acc();
  const emojiHtml=EMOJIS.map(e=>`<button class="icon-opt${e===a.emoji?" active":""}" data-emoji="${e}">${e}</button>`).join("");
  const colorHtml=COLORS.map(c=>`<button class="color-opt${c===a.color?" active":""}" data-color="${c}" style="background:${c}"></button>`).join("");
  openSheet(`<div class="sheet-title">แก้ไขบัญชี</div>
    <div class="lbl">ชื่อ</div><input class="inp" value="${a.name}" id="sh-name" style="margin-bottom:14px">
    <div class="lbl">อิโมจิ</div><div class="icon-grid" id="sh-emojis">${emojiHtml}</div>
    <div class="lbl">สี</div><div class="color-grid" id="sh-colors">${colorHtml}</div>
    <button class="btn" style="background:${a.color}" id="sh-save">บันทึก</button>
    ${data.accounts.length>1?`<button class="btn" style="background:var(--danger-soft);color:var(--danger);margin-top:10px" id="sh-del">ลบบัญชีนี้</button>`:""}`);
  setTimeout(()=>{
    let newEmoji=a.emoji,newColor=a.color;
    document.getElementById("sh-emojis")?.addEventListener("click",e=>{const b=e.target.closest("[data-emoji]");if(!b)return;document.querySelectorAll("#sh-emojis .icon-opt").forEach(x=>x.classList.remove("active"));b.classList.add("active");newEmoji=b.dataset.emoji;});
    document.getElementById("sh-colors")?.addEventListener("click",e=>{const b=e.target.closest("[data-color]");if(!b)return;document.querySelectorAll(".color-opt").forEach(x=>x.classList.remove("active"));b.classList.add("active");newColor=b.dataset.color;});
    document.getElementById("sh-save")?.addEventListener("click",()=>{
      closeSheet();
      withApi(actions.updateAcc({name:document.getElementById("sh-name").value.trim()||a.name,emoji:newEmoji,color:newColor}),"บันทึกแล้ว");
    });
    document.getElementById("sh-del")?.addEventListener("click",()=>{
      if(!confirm(`ลบบัญชี "${a.name}"?\nกล่องและประวัติทั้งหมดจะถูกลบด้วย`))return;
      closeSheet();
      withApi(actions.deleteAcc(),"ลบบัญชีแล้ว").then(()=>{sel=0;});
    });
  },100);
}

function openBoxAction(boxId){
  const a=acc();const box=a.boxes.find(b=>b.id===boxId);if(!box)return;
  const others=a.boxes.filter(b=>b.id!==boxId);
  const optHtml=others.map(b=>`<option value="${b.id}">${ICONS[b.icon]||"📦"} ${b.name} — ฿${fmt(b.amount)}</option>`).join("");
  openSheet(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div style="width:54px;height:54px;border-radius:16px;background:${a.color}1A;color:${a.color};display:flex;align-items:center;justify-content:center;font-size:28px">${ICONS[box.icon]||"📦"}</div>
      <div><div style="font-size:18px;font-weight:700;letter-spacing:-.01em">${box.name}</div><div style="font-size:15px;color:${a.color};font-weight:700;margin-top:2px">฿${fmt(box.amount)}</div></div>
    </div>
    <div class="tab-bar" id="sh-tabs">
      <button class="tab-btn active" data-tab="withdraw" style="background:var(--danger)">ถอน</button>
      <button class="tab-btn" data-tab="deposit">เพิ่ม</button>
      <button class="tab-btn" data-tab="transfer">โอน</button>
    </div>
    <input class="inp" type="number" inputmode="decimal" placeholder="จำนวนเงิน" id="sh-amt">
    <input class="inp" placeholder="หมายเหตุ (ไม่บังคับ)" id="sh-note" style="margin-top:10px">
    <select class="inp" id="sh-tobox" style="margin-top:10px;display:none"><option value="">เลือกกล่องปลายทาง</option>${optHtml}</select>
    <button class="btn" style="background:var(--danger);margin-top:16px" id="sh-submit">ถอนเงิน</button>`);
  setTimeout(()=>{
    let curTab="withdraw";
    const colors={withdraw:"var(--danger)",deposit:"var(--success)",transfer:"var(--primary)"};
    const labels={withdraw:"ถอนเงิน",deposit:"เพิ่มเงิน",transfer:"โอนเงิน"};
    document.getElementById("sh-tabs")?.addEventListener("click",e=>{
      const b=e.target.closest("[data-tab]");if(!b)return;curTab=b.dataset.tab;
      document.querySelectorAll("#sh-tabs .tab-btn").forEach(x=>{x.classList.remove("active");x.style.background="transparent";});
      b.classList.add("active");b.style.background=colors[curTab];
      document.getElementById("sh-note").style.display=curTab==="transfer"?"none":"block";
      document.getElementById("sh-tobox").style.display=curTab==="transfer"?"block":"none";
      const btn=document.getElementById("sh-submit");btn.textContent=labels[curTab];btn.style.background=colors[curTab];
    });
    document.getElementById("sh-amt")?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{
      const n=Number(document.getElementById("sh-amt").value);if(n<=0)return;
      closeSheet();
      if(curTab==="transfer"){const to=document.getElementById("sh-tobox").value;if(!to)return;withApi(actions.transfer(boxId,to,n),"โอนสำเร็จ");}
      else{withApi(actions.transact(boxId,curTab,n,document.getElementById("sh-note").value.trim()),curTab==="withdraw"?"ถอนสำเร็จ":"เพิ่มสำเร็จ");}
    });
  },100);
}

async function doAddAccount(){
  await withApi(actions.addAccount(),"สร้างบัญชีสำเร็จ");
  sel=data.accounts.length-1;
  render();
}

// ════════════════════════════════════════════════════════════
// EVENT BINDING
// ════════════════════════════════════════════════════════════
function bind(){
  document.querySelectorAll("[data-page]").forEach(el=>el.addEventListener("click",()=>{page=el.dataset.page;render();}));
  document.querySelectorAll("[data-sel]").forEach(el=>el.addEventListener("click",()=>{sel=parseInt(el.dataset.sel);render();}));
  document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const a=el.dataset.action;
    if(a==="deposit")openDeposit();
    else if(a==="addBox")openAddBox();
    else if(a==="editAcc")openEditAcc();
    else if(a==="addAccount")doAddAccount();
  }));
  document.querySelectorAll("[data-boxid]").forEach(el=>el.addEventListener("click",()=>openBoxAction(el.dataset.boxid)));
  document.querySelectorAll("[data-delbox]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    if(confirm("ลบกล่องนี้? ยอดเงินจะคืนสู่บัญชี"))withApi(actions.removeBox(el.dataset.delbox),"ลบกล่องแล้ว");
  }));
}

// INIT
// ════════════════════════════════════════════════════════════
(async()=>{
  if(await reload())render();
})();
</script>
