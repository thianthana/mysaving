<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0E1A">
<title>My Finance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0E1A;--card:#1A2038;--border:#ffffff0a;--text:#E4E8F1;--muted:#6B7A99;--accent:#6C63FF}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;overflow-x:hidden;min-height:100vh}
input,select,button{font-family:inherit;border:none;outline:none}
input:focus,select:focus{border-color:rgba(108,99,255,.5)!important}
::-webkit-scrollbar{display:none}

.app{max-width:430px;margin:0 auto;padding-bottom:72px;min-height:100vh}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 0}
.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-title{font-size:18px;font-weight:700}
.hdr-btn{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}

/* Pills */
.pills{display:flex;gap:8px;padding:14px 16px 0;overflow-x:auto}
.pill{flex:0 0 auto;padding:9px 18px;border-radius:22px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .2s;background:var(--card);color:var(--muted);border:none}
.pill.active{color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.pill-add{flex:0 0 auto;padding:9px 16px;border-radius:22px;border:1.5px dashed #333;background:transparent;color:var(--muted);cursor:pointer;font-size:13px}

/* Balance Card */
.bal{margin:14px 16px;border-radius:22px;padding:24px 22px 20px;position:relative;overflow:hidden;color:#fff}
.bal-circle1{position:absolute;top:-25px;right:-25px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.bal-circle2{position:absolute;bottom:-15px;left:-15px;width:70px;height:70px;border-radius:35px;background:rgba(255,255,255,.05)}
.bal-inner{position:relative;z-index:1}
.bal-label{font-size:11px;color:rgba(255,255,255,.65)}
.bal-amount{font-size:30px;font-weight:700;margin-top:4px;letter-spacing:-.03em}
.bal-row{display:flex;gap:20px;margin-top:14px}
.bal-sub-label{font-size:10px;color:rgba(255,255,255,.5)}
.bal-sub-val{font-size:14px;font-weight:700}
.bal-bar{margin-top:14px;height:5px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden}
.bal-bar-fill{height:100%;border-radius:3px;background:rgba(255,255,255,.8);transition:width .4s}

/* Action Buttons */
.actions{display:flex;gap:10px;margin:0 16px 16px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--text);font-size:13px;font-weight:600}

/* Boxes Grid */
.section{padding:0 16px}
.section-hdr{display:flex;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:15px;font-weight:700}
.section-sub{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.box{background:var(--card);border-radius:18px;padding:16px 14px;cursor:pointer;border:1px solid #ffffff08;position:relative;overflow:hidden;transition:transform .15s}
.box:active{transform:scale(.97)}
.box-accent{position:absolute;top:0;left:0;right:0;height:3px}
.box-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.box-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.box-del{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px}
.box-name{font-size:12px;color:var(--muted);margin-bottom:2px}
.box-amt{font-size:17px;font-weight:700}
.box-bar{margin-top:8px;height:4px;border-radius:2px;background:rgba(255,255,255,.05);overflow:hidden}
.box-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.box-pct{font-size:10px;color:#555;margin-top:3px}
.empty{text-align:center;padding:40px;color:#555;font-size:13px}

/* Transaction Row */
.tx{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #ffffff08}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-note{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:11px;color:var(--muted)}
.tx-amt{font-size:14px;font-weight:700;flex-shrink:0}
.tx-in{color:#00C9A7}.tx-out{color:#FF6B8A}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,14,26,.94);backdrop-filter:blur(16px);border-top:1px solid #ffffff08;display:flex;z-index:50;padding:4px 0 8px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:transparent;cursor:pointer;border:none}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:600}
.nav-btn.active{color:var(--accent)}
.nav-btn:not(.active){color:#4A5568}

/* Sheet / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:auto}
.sheet{background:#151C2E;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:#ffffff20;margin:10px auto 0}
.sheet-body{padding:16px 20px 28px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* Form elements */
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #ffffff10;background:var(--card);color:var(--text);font-size:14px;box-sizing:border-box;margin-bottom:0}
.inp-big{font-size:26px;font-weight:700;text-align:center;padding:18px}
.inp-unit{text-align:center;font-size:11px;color:var(--muted);margin:6px 0 14px}
.lbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.btn{width:100%;padding:15px;border-radius:14px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;border:none;margin-top:0}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.icon-opt{width:40px;height:40px;border-radius:10px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid #ffffff10;background:var(--card)}
.icon-opt.active{border:2px solid var(--accent);background:rgba(108,99,255,.1)}
.color-grid{display:flex;gap:6px;margin-bottom:16px}
.color-opt{width:32px;height:32px;border-radius:16px;cursor:pointer;border:2px solid transparent}
.color-opt.active{border:3px solid #fff}
.tab-bar{display:flex;gap:4px;padding:3px;border-radius:12px;background:var(--card);margin-bottom:16px}
.tab-btn{flex:1;padding:10px 0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:all .15s;background:transparent;color:var(--muted);border:none}
.tab-btn.active{color:#fff}

/* Profile stats */
.stat-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:10px}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-label{font-size:11px;color:var(--muted)}
.stat-val{font-size:17px;font-weight:700}
.pbar{height:6px;border-radius:3px;background:var(--card);overflow:hidden;margin-top:4px;margin-bottom:14px}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const ICONS={tuition:"🎓",expense:"💳",food:"🍜",transport:"🚌",rent:"🏠",book:"📚",health:"💊",saving:"💰",phone:"📱",clothes:"👕",entertainment:"🎬",other:"📦"};
const ICON_KEYS=Object.keys(ICONS);
const uid=()=>"id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const dtShort=d=>new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short"});

const STORAGE_KEY="fin_v4";
const DEFAULT_DATA={
  accounts:[
    {id:"a1",name:"ป.โท",emoji:"🎓",color:"#6C63FF",balance:50000,boxes:[{id:"b1",name:"ค่าเทอม",icon:"tuition",amount:30000},{id:"b2",name:"ค่าใช้จ่าย",icon:"expense",amount:15000},{id:"b3",name:"ค่าหนังสือ",icon:"book",amount:5000}]},
    {id:"a2",name:"ป.เอก",emoji:"🔬",color:"#00C9A7",balance:80000,boxes:[{id:"b4",name:"ค่าเทอม",icon:"tuition",amount:50000},{id:"b5",name:"ค่าครองชีพ",icon:"food",amount:20000},{id:"b6",name:"ค่าวิจัย",icon:"book",amount:10000}]},
    {id:"a3",name:"เงินสำรอง",emoji:"🏦",color:"#FF8C42",balance:25000,boxes:[{id:"b7",name:"ฉุกเฉิน",icon:"saving",amount:15000},{id:"b8",name:"สุขภาพ",icon:"health",amount:10000}]}
  ],
  history:[
    {id:"h1",accId:"a1",boxId:"b2",type:"withdraw",amount:500,note:"ค่ารถ",date:"2026-06-18T10:30:00"},
    {id:"h2",accId:"a1",boxId:"b1",type:"deposit",amount:30000,note:"โอนค่าเทอม",date:"2026-06-17T09:00:00"},
    {id:"h3",accId:"a2",boxId:"b5",type:"withdraw",amount:1200,note:"ค่าอาหาร",date:"2026-06-16T18:00:00"}
  ]
};

let data, sel=0, page="home";

function load(){try{const s=localStorage.getItem(STORAGE_KEY);data=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_DATA));}catch{data=JSON.parse(JSON.stringify(DEFAULT_DATA));}}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch{}}
function acc(){return data.accounts[sel]||data.accounts[0];}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function addDeposit(amount){
  const a=acc();a.balance+=amount;
  data.history.push({id:uid(),accId:a.id,boxId:null,type:"deposit",amount,note:"เพิ่มเงินเข้าบัญชี",date:new Date().toISOString()});
  save();render();
}
function addBox(name,icon,amount){
  acc().boxes.push({id:uid(),name,icon,amount:amount||0});
  save();render();
}
function removeBox(boxId){
  const a=acc();const b=a.boxes.find(x=>x.id===boxId);
  if(b){a.balance+=b.amount;a.boxes=a.boxes.filter(x=>x.id!==boxId);}
  save();render();
}
function transact(boxId,type,amount,note){
  const a=acc();const b=a.boxes.find(x=>x.id===boxId);if(!b)return;
  if(type==="withdraw"){if(amount>b.amount){alert("ยอดเงินไม่พอ");return;}b.amount-=amount;a.balance-=amount;}
  else{b.amount+=amount;a.balance+=amount;}
  data.history.push({id:uid(),accId:a.id,boxId,type,amount,note,date:new Date().toISOString()});
  save();render();
}
function transferBox(fromId,toId,amount){
  const a=acc();const f=a.boxes.find(x=>x.id===fromId);const t=a.boxes.find(x=>x.id===toId);
  if(!f||!t||amount>f.amount){alert("ยอดเงินไม่พอ");return;}
  f.amount-=amount;t.amount+=amount;save();render();
}
function addAccount(){
  const colors=["#6C63FF","#00C9A7","#FF8C42","#FF6B8A","#45B7D1","#A78BFA"];
  data.accounts.push({id:uid(),name:"บัญชี "+(data.accounts.length+1),emoji:"💼",color:colors[data.accounts.length%6],balance:0,boxes:[]});
  sel=data.accounts.length-1;save();render();
}
function updateAcc(u){Object.assign(acc(),u);save();render();}
function deleteAcc(){
  if(data.accounts.length<=1)return;
  const id=data.accounts[sel].id;
  data.accounts.splice(sel,1);
  data.history=data.history.filter(h=>h.accId!==id);
  sel=Math.max(0,sel-1);save();render();
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(page==="home") app.innerHTML=renderHome();
  else if(page==="history") app.innerHTML=renderHistory();
  else if(page==="profile") app.innerHTML=renderProfile();
  app.innerHTML+=renderNav();
  bindEvents();
}

function renderHome(){
  const a=acc();
  const boxSum=a.boxes.reduce((s,b)=>s+b.amount,0);
  const unalloc=a.balance-boxSum;
  const pct=a.balance>0?Math.min(boxSum/a.balance*100,100):0;
  const hist=data.history.filter(h=>h.accId===a.id).sort((x,y)=>new Date(y.date)-new Date(x.date)).slice(0,5);

  let pills=data.accounts.map((ac,i)=>`<button class="pill${i===sel?" active":""}" data-sel="${i}" style="${i===sel?`background:${ac.color};box-shadow:0 4px 16px ${ac.color}44`:""}">${ac.emoji} ${ac.name}</button>`).join("");
  pills+=`<button class="pill-add" data-action="addAccount">+</button>`;

  let boxes=a.boxes.map(b=>{
    const bp=a.balance>0?(b.amount/a.balance*100):0;
    return `<div class="box" data-boxid="${b.id}">
      <div class="box-accent" style="background:${a.color}"></div>
      <div class="box-top">
        <div class="box-icon" style="background:${a.color}18">${ICONS[b.icon]||"📦"}</div>
        <button class="box-del" data-delbox="${b.id}">✕</button>
      </div>
      <div class="box-name">${b.name}</div>
      <div class="box-amt">฿${fmt(b.amount)}</div>
      <div class="box-bar"><div class="box-bar-fill" style="width:${Math.min(bp,100)}%;background:${a.color}"></div></div>
      <div class="box-pct">${bp.toFixed(0)}%</div>
    </div>`;
  }).join("");

  let txHtml=hist.map(h=>{
    const box=a.boxes.find(b=>b.id===h.boxId);
    return txRow(h,box?.name||"บัญชี","");
  }).join("");

  return `
    <div class="hdr"><div><div class="hdr-sub">สวัสดี 👋</div><div class="hdr-title">My Finance</div></div><button class="hdr-btn" data-action="editAcc">⚙️</button></div>
    <div class="pills">${pills}</div>
    <div class="bal" style="background:linear-gradient(135deg,${a.color},${a.color}aa)">
      <div class="bal-circle1"></div><div class="bal-circle2"></div>
      <div class="bal-inner">
        <div class="bal-label">ยอดเงินทั้งหมด</div>
        <div class="bal-amount">฿${fmt(a.balance)}</div>
        <div class="bal-row">
          <div><div class="bal-sub-label">จัดสรรแล้ว</div><div class="bal-sub-val">฿${fmt(boxSum)}</div></div>
          <div><div class="bal-sub-label">คงเหลือ</div><div class="bal-sub-val" style="${unalloc<0?"color:#fcc":""}">฿${fmt(unalloc)}</div></div>
        </div>
        <div class="bal-bar"><div class="bal-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="actions">
      <button class="act-btn" data-action="deposit"><span style="font-size:18px">↓</span> เพิ่มเงิน</button>
      <button class="act-btn" data-action="addBox"><span style="font-size:18px">+</span> สร้างกล่อง</button>
    </div>
    <div class="section">
      <div class="section-hdr"><span class="section-title">กล่องเงิน</span><span class="section-sub">${a.boxes.length} กล่อง</span></div>
      <div class="grid">${boxes}</div>
      ${a.boxes.length===0?'<div class="empty">📦 ยังไม่มีกล่อง — กด "สร้างกล่อง"</div>':""}
    </div>
    <div class="section" style="padding-top:20px">
      <div class="section-title" style="margin-bottom:10px">รายการล่าสุด</div>
      ${txHtml}
      ${hist.length===0?'<div class="empty">ไม่มีรายการ</div>':""}
    </div>`;
}

function renderHistory(){
  const sorted=[...data.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html=sorted.map(h=>{
    const a=data.accounts.find(x=>x.id===h.accId);
    const box=a?.boxes.find(b=>b.id===h.boxId);
    return txRow(h,box?.name||"บัญชี",a?`${a.emoji} ${a.name} · `:"");
  }).join("");
  return `<div style="padding:16px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">ประวัติรายการ</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${data.history.length} รายการ</div>
    ${html}${data.history.length===0?'<div class="empty">ไม่มีรายการ</div>':""}
  </div>`;
}

function renderProfile(){
  const tot=data.accounts.reduce((s,a)=>s+a.balance,0);
  const deps=data.history.filter(h=>h.type==="deposit").reduce((s,h)=>s+h.amount,0);
  const wds=data.history.filter(h=>h.type==="withdraw").reduce((s,h)=>s+h.amount,0);
  const stats=[
    {i:"💰",l:"ยอดรวม",v:"฿"+fmt(tot),c:"#6C63FF"},
    {i:"📥",l:"เงินเข้าสะสม",v:"฿"+fmt(deps),c:"#00C9A7"},
    {i:"📤",l:"เงินออกสะสม",v:"฿"+fmt(wds),c:"#FF6B8A"},
    {i:"🏦",l:"จำนวนบัญชี",v:data.accounts.length,c:"#FF8C42"},
    {i:"📦",l:"กล่องทั้งหมด",v:data.accounts.reduce((s,a)=>s+a.boxes.length,0),c:"#45B7D1"},
  ];
  let shtml=stats.map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.c}15">${s.i}</div><div style="flex:1"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div></div>`).join("");
  let bars=data.accounts.map(a=>{
    const p=tot>0?(a.balance/tot*100):0;
    return `<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600">${a.emoji} ${a.name}</span><span style="font-size:13px;font-weight:700;color:${a.color}">฿${fmt(a.balance)}</span></div><div class="pbar"><div class="pbar-fill" style="width:${p}%;background:${a.color}"></div></div></div>`;
  }).join("");
  return `<div style="padding:16px">
    <div style="font-size:18px;font-weight:700;margin-bottom:16px">สรุปภาพรวม</div>
    ${shtml}
    <div style="margin-top:20px;font-size:14px;font-weight:700;margin-bottom:10px">สัดส่วนบัญชี</div>
    ${bars}
    <a href="admin.html" style="display:block;margin-top:20px;padding:16px;border-radius:16px;background:var(--card);border:1px solid var(--border);font-size:13px;color:var(--accent);text-decoration:none;text-align:center;font-weight:600">🖥️ เปิด Admin Dashboard →</a>
  </div>`;
}

function txRow(h,boxName,prefix){
  const isIn=h.type==="deposit";
  return `<div class="tx">
    <div class="tx-icon" style="background:${isIn?"rgba(0,201,167,.1)":"rgba(255,107,138,.1)"}">${isIn?"↓":"↑"}</div>
    <div class="tx-info"><div class="tx-note">${h.note||"—"}</div><div class="tx-meta">${prefix}${boxName} · ${dtShort(h.date)}</div></div>
    <div class="tx-amt ${isIn?"tx-in":"tx-out"}">${isIn?"+":"-"}฿${fmt(h.amount)}</div>
  </div>`;
}

function renderNav(){
  const tabs=[{k:"home",i:"🏠",l:"หน้าหลัก"},{k:"history",i:"📋",l:"ประวัติ"},{k:"profile",i:"👤",l:"โปรไฟล์"}];
  return `<div class="nav">${tabs.map(t=>`<button class="nav-btn${page===t.k?" active":""}" data-page="${t.k}"><span class="nav-icon">${t.i}</span><span class="nav-label">${t.l}</span></button>`).join("")}</div>`;
}

// ══════════════════════════════════════
// SHEET (modal) SYSTEM
// ══════════════════════════════════════
let overlayEl;
function openSheet(html){
  if(!overlayEl){overlayEl=document.createElement("div");overlayEl.className="overlay";overlayEl.innerHTML=`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-body"></div></div>`;document.body.appendChild(overlayEl);overlayEl.addEventListener("click",e=>{if(e.target===overlayEl)closeSheet();});}
  overlayEl.querySelector(".sheet-body").innerHTML=html;
  requestAnimationFrame(()=>overlayEl.classList.add("open"));
}
function closeSheet(){if(overlayEl)overlayEl.classList.remove("open");}

function openDeposit(){
  const a=acc();
  openSheet(`<div class="sheet-title">เพิ่มเงินเข้าบัญชี</div>
    <input class="inp inp-big" type="number" inputmode="decimal" placeholder="0.00" id="sh-amt">
    <div class="inp-unit">บาท</div>
    <button class="btn" style="background:${a.color}" id="sh-submit">เพิ่มเงิน</button>`);
  setTimeout(()=>{
    const el=document.getElementById("sh-amt");el?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{const n=Number(el.value);if(n>0){addDeposit(n);closeSheet();}});
  },100);
}

function openAddBox(){
  let iconHtml=ICON_KEYS.map(k=>`<button class="icon-opt${k==="saving"?" active":""}" data-icon="${k}">${ICONS[k]}</button>`).join("");
  openSheet(`<div class="sheet-title">สร้างกล่องเงินใหม่</div>
    <div class="lbl">ชื่อกล่อง</div><input class="inp" placeholder="เช่น ค่าเทอม" id="sh-name" style="margin-bottom:12px">
    <div class="lbl">ไอคอน</div><div class="icon-grid" id="sh-icons">${iconHtml}</div>
    <div class="lbl">จำนวนเริ่มต้น (ไม่บังคับ)</div><input class="inp" type="number" inputmode="decimal" placeholder="0.00" id="sh-amt">
    <button class="btn" style="background:var(--accent);margin-top:16px" id="sh-submit">สร้างกล่อง</button>`);
  setTimeout(()=>{
    let selIcon="saving";
    document.getElementById("sh-icons")?.addEventListener("click",e=>{
      const b=e.target.closest("[data-icon]");if(!b)return;
      document.querySelectorAll(".icon-opt").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");selIcon=b.dataset.icon;
    });
    document.getElementById("sh-name")?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{
      const name=document.getElementById("sh-name").value.trim();
      if(name){addBox(name,selIcon,Number(document.getElementById("sh-amt").value)||0);closeSheet();}
    });
  },100);
}

function openEditAcc(){
  const a=acc();
  const emojis=["🎓","🔬","🏦","💼","📊","🎯","🌟","💎","🚀","🔥"];
  const colors=["#6C63FF","#00C9A7","#FF8C42","#FF6B8A","#45B7D1","#A78BFA","#F472B6","#34D399"];
  let emojiHtml=emojis.map(e=>`<button class="icon-opt${e===a.emoji?" active":""}" data-emoji="${e}" style="width:38px;height:38px;font-size:18px">${e}</button>`).join("");
  let colorHtml=colors.map(c=>`<button class="color-opt${c===a.color?" active":""}" data-color="${c}" style="background:${c}"></button>`).join("");
  openSheet(`<div class="sheet-title">แก้ไขบัญชี</div>
    <div class="lbl">ชื่อ</div><input class="inp" value="${a.name}" id="sh-name" style="margin-bottom:12px">
    <div class="lbl">อิโมจิ</div><div class="icon-grid" id="sh-emojis">${emojiHtml}</div>
    <div class="lbl">สี</div><div class="color-grid" id="sh-colors">${colorHtml}</div>
    <button class="btn" style="background:${a.color}" id="sh-save">บันทึก</button>
    ${data.accounts.length>1?`<button class="btn" style="background:rgba(255,107,138,.1);color:#FF6B8A;margin-top:8px" id="sh-del">ลบบัญชีนี้</button>`:""}`);
  setTimeout(()=>{
    let newEmoji=a.emoji,newColor=a.color;
    document.getElementById("sh-emojis")?.addEventListener("click",e=>{const b=e.target.closest("[data-emoji]");if(!b)return;document.querySelectorAll("#sh-emojis .icon-opt").forEach(x=>x.classList.remove("active"));b.classList.add("active");newEmoji=b.dataset.emoji;});
    document.getElementById("sh-colors")?.addEventListener("click",e=>{const b=e.target.closest("[data-color]");if(!b)return;document.querySelectorAll(".color-opt").forEach(x=>x.classList.remove("active"));b.classList.add("active");newColor=b.dataset.color;});
    document.getElementById("sh-save")?.addEventListener("click",()=>{updateAcc({name:document.getElementById("sh-name").value.trim()||a.name,emoji:newEmoji,color:newColor});closeSheet();});
    document.getElementById("sh-del")?.addEventListener("click",()=>{deleteAcc();closeSheet();});
  },100);
}

function openBoxAction(boxId){
  const a=acc();const box=a.boxes.find(b=>b.id===boxId);if(!box)return;
  const others=a.boxes.filter(b=>b.id!==boxId);
  let optHtml=others.map(b=>`<option value="${b.id}">${ICONS[b.icon]||"📦"} ${b.name} — ฿${fmt(b.amount)}</option>`).join("");
  openSheet(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:48px;height:48px;border-radius:14px;background:${a.color}18;display:flex;align-items:center;justify-content:center;font-size:26px">${ICONS[box.icon]||"📦"}</div>
      <div><div style="font-size:17px;font-weight:700">${box.name}</div><div style="font-size:14px;color:${a.color};font-weight:600">฿${fmt(box.amount)}</div></div>
    </div>
    <div class="tab-bar" id="sh-tabs">
      <button class="tab-btn active" data-tab="withdraw" style="background:#FF6B8A;color:#fff">ถอน</button>
      <button class="tab-btn" data-tab="deposit">เพิ่ม</button>
      <button class="tab-btn" data-tab="transfer">โอน</button>
    </div>
    <input class="inp" type="number" inputmode="decimal" placeholder="จำนวนเงิน" id="sh-amt">
    <input class="inp" placeholder="หมายเหตุ (ไม่บังคับ)" id="sh-note" style="margin-top:8px">
    <select class="inp" id="sh-tobox" style="margin-top:8px;display:none"><option value="">เลือกกล่องปลายทาง</option>${optHtml}</select>
    <button class="btn" style="background:#FF6B8A;margin-top:14px" id="sh-submit">ถอนเงิน</button>`);
  setTimeout(()=>{
    let curTab="withdraw";
    const colors={withdraw:"#FF6B8A",deposit:"#00C9A7",transfer:"#6C63FF"};
    const labels={withdraw:"ถอนเงิน",deposit:"เพิ่มเงิน",transfer:"โอนเงิน"};
    document.getElementById("sh-tabs")?.addEventListener("click",e=>{
      const b=e.target.closest("[data-tab]");if(!b)return;curTab=b.dataset.tab;
      document.querySelectorAll("#sh-tabs .tab-btn").forEach(x=>{x.classList.remove("active");x.style.background="transparent";x.style.color="var(--muted)";});
      b.classList.add("active");b.style.background=colors[curTab];b.style.color="#fff";
      document.getElementById("sh-note").style.display=curTab==="transfer"?"none":"block";
      document.getElementById("sh-tobox").style.display=curTab==="transfer"?"block":"none";
      const btn=document.getElementById("sh-submit");btn.textContent=labels[curTab];btn.style.background=colors[curTab];
    });
    document.getElementById("sh-amt")?.focus();
    document.getElementById("sh-submit")?.addEventListener("click",()=>{
      const n=Number(document.getElementById("sh-amt").value);if(n<=0)return;
      if(curTab==="transfer"){const to=document.getElementById("sh-tobox").value;if(!to)return;transferBox(boxId,to,n);}
      else{transact(boxId,curTab,n,document.getElementById("sh-note").value.trim());}
      closeSheet();
    });
  },100);
}

// ══════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════
function bindEvents(){
  document.querySelectorAll("[data-page]").forEach(el=>el.addEventListener("click",()=>{page=el.dataset.page;render();}));
  document.querySelectorAll("[data-sel]").forEach(el=>el.addEventListener("click",()=>{sel=parseInt(el.dataset.sel);render();}));
  document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const a=el.dataset.action;
    if(a==="deposit")openDeposit();
    else if(a==="addBox")openAddBox();
    else if(a==="editAcc")openEditAcc();
    else if(a==="addAccount"){addAccount();}
  }));
  document.querySelectorAll("[data-boxid]").forEach(el=>el.addEventListener("click",()=>openBoxAction(el.dataset.boxid)));
  document.querySelectorAll("[data-delbox]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();removeBox(el.dataset.delbox);}));
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
load();
render();
</script>
