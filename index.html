<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8FAFC;
  --surface:#FFFFFF;
  --surface-2:#F1F5F9;
  --border:#E2E8F0;
  --border-light:#F1F5F9;
  --text:#0F172A;
  --text-2:#475569;
  --muted:#94A3B8;
  --primary:#6366F1;
  --primary-soft:#EEF2FF;
  --success:#10B981;
  --success-soft:#ECFDF5;
  --danger:#EF4444;
  --danger-soft:#FEF2F2;
  --warning:#F59E0B;
  --warning-soft:#FEF3C7;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 12px rgba(15,23,42,.06);
  --shadow-lg:0 10px 30px rgba(15,23,42,.08);
  --font:'Plus Jakarta Sans','IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;min-height:100vh;font-feature-settings:"cv11"}
input,select,button,textarea{font-family:inherit;outline:none;border:none}
input:focus,select:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
button{cursor:pointer}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ─── Toast & Loading ─── */
.toast{position:fixed;top:24px;right:24px;background:var(--text);color:#fff;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;transform:translateX(120%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.toast.show{transform:translateX(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.loading{position:fixed;inset:0;background:rgba(248,250,252,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:150}
.loading.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease both}

/* ─── PIN system ─── */
.lock-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:var(--surface-2);font-size:10px;font-weight:600;color:var(--text-2);margin-left:8px;cursor:pointer;transition:all .15s;border:1px solid var(--border)}
.lock-badge:hover{background:var(--primary-soft);color:var(--primary);border-color:transparent}
.lock-badge.unlocked{background:var(--success-soft);color:var(--success);border-color:transparent}
.masked-text{color:var(--muted);font-family:system-ui,monospace;letter-spacing:.15em}
.pin-modal{background:var(--surface);border-radius:20px;width:100%;max-width:380px;padding:28px 24px;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.overlay.open .pin-modal{transform:scale(1)}
.pin-header{text-align:center;margin-bottom:20px}
.pin-acc-icon{width:60px;height:60px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:10px}
.pin-title{font-size:18px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--text-2)}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:22px}
.pin-dot{width:14px;height:14px;border-radius:7px;background:var(--surface-2);border:2px solid var(--border);transition:all .2s}
.pin-dot.filled{background:var(--primary);border-color:var(--primary)}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.pin-key{height:52px;border-radius:14px;background:var(--surface-2);font-size:20px;font-weight:600;color:var(--text);font-family:inherit;transition:all .1s;border:none}
.pin-key:hover{background:var(--primary-soft);color:var(--primary)}
.pin-key:active{transform:scale(.95)}
.pin-key.action{background:transparent;font-size:13px;font-weight:600;color:var(--text-2)}
.pin-key.danger{color:var(--danger)}
.pin-cancel{display:block;width:100%;padding:10px;margin-top:6px;color:var(--text-2);font-size:13px;font-weight:500;background:transparent;border:none}
.pin-error{text-align:center;font-size:12px;color:var(--danger);font-weight:600;min-height:18px;margin-bottom:6px}

/* ─── Sidebar ─── */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:10}
.side-logo{padding:24px 22px 20px;display:flex;align-items:center;gap:12px}
.side-logo-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#6366F1,#10B981);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.25)}
.side-logo-text{font-size:16px;font-weight:800;letter-spacing:-.02em}
.side-logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:2px}
.side-nav{flex:1;padding:8px 12px}
.side-btn{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:2px;text-align:left;background:transparent;color:var(--text-2);transition:all .15s}
.side-btn.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.side-btn:hover:not(.active){background:var(--surface-2)}
.side-icon{font-size:18px;display:inline-flex;width:24px;justify-content:center}
.side-footer{padding:14px;border-top:1px solid var(--border)}
.side-total{padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,#EEF2FF,#F5F3FF);border:1px solid #DDD6FE;margin-bottom:8px}
.side-total-label{font-size:10px;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.side-total-val{font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-.02em}
.side-link{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;border:1px solid var(--border);text-align:center;color:var(--text-2);text-decoration:none;font-size:12px;font-weight:500;justify-content:center;transition:all .15s}
.side-link:hover{background:var(--surface-2);border-color:var(--muted)}

/* ─── Main ─── */
.main{flex:1;margin-left:240px;padding:28px 36px 40px;min-width:0}
h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:24px}

/* ─── Cards ─── */
.card{background:var(--surface);border-radius:18px;padding:22px 24px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.card-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ─── Stat grid ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.stat{padding:20px 22px;border-radius:18px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:all .15s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-deco{position:absolute;top:-15px;right:-15px;width:60px;height:60px;border-radius:30px;opacity:.08}
.stat-icon-sm{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;font-size:16px;margin-bottom:10px}
.stat-label{font-size:11px;color:var(--text-2);margin-bottom:4px;font-weight:500;letter-spacing:.02em}
.stat-val{font-size:24px;font-weight:800;letter-spacing:-.02em}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.three-col{display:grid;grid-template-columns:5fr 4fr;gap:18px}

/* ─── Table ─── */
.table-wrap{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse}
th{padding:13px 18px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface-2)}
td{padding:14px 18px;font-size:13px;border-bottom:1px solid var(--border-light);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}

/* ─── Buttons ─── */
.pri-btn{padding:11px 22px;border-radius:11px;font-size:13px;font-weight:600;color:#fff;background:var(--primary);transition:all .15s;border:none}
.pri-btn:hover{background:#4F46E5;transform:translateY(-1px);box-shadow:var(--shadow)}
.pri-btn:active{transform:translateY(0)}
.sec-btn{padding:11px 22px;border-radius:11px;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--border);transition:all .15s}
.sec-btn:hover{background:var(--surface-2)}
.dan-btn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;background:var(--danger-soft);color:var(--danger);transition:all .15s}
.dan-btn:hover{background:#FEE2E2}
.badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block}
.badge-in{background:var(--success-soft);color:var(--success)}
.badge-out{background:var(--danger-soft);color:var(--danger)}

/* ─── Forms ─── */
.inp{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;box-sizing:border-box;transition:all .15s;font-family:inherit}
.lbl{font-size:10px;color:var(--text-2);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.form-row{margin-bottom:10px}

/* ─── Account pills ─── */
.acc-pills{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.acc-pill{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:all .15s;box-shadow:var(--shadow-sm)}
.acc-pill:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.acc-pill.active{border-width:2px}
.acc-pill .pill-bal{opacity:.55;font-weight:500;font-size:11px}

/* ─── Tabs ─── */
.tab-row{display:flex;gap:4px;padding:3px;border-radius:10px;background:var(--surface-2);margin-bottom:10px}
.tab-sm{flex:1;padding:8px 0;border-radius:8px;font-size:12px;font-weight:600;background:transparent;color:var(--text-2);text-align:center;transition:all .15s}
.tab-sm.active{color:#fff;box-shadow:var(--shadow-sm)}

/* ─── Progress bar ─── */
.pbar{height:7px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:4px}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* ─── Filters ─── */
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:600;background:transparent;color:var(--text-2);border:1px solid transparent;transition:all .15s}
.filter-btn.active{background:var(--primary-soft);color:var(--primary)}
.filter-btn:not(.active):hover{background:var(--surface-2)}

/* ─── Icon picker (forms) ─── */
.icon-grid-sm{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.icon-opt-sm{width:32px;height:32px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.icon-opt-sm.active{border-color:var(--primary);background:var(--primary-soft)}

/* ─── Settings grid ─── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:840px}

/* ─── Sheet/Modal ─── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:440px;padding:28px;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.overlay.open .modal{transform:scale(1)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-.01em}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.color-grid{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.color-opt{width:30px;height:30px;border-radius:15px;border:3px solid transparent;transition:all .15s}
.color-opt.active{border-color:#fff;box-shadow:0 0 0 2px var(--text)}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="side-logo">
    <div class="side-logo-icon">💰</div>
    <div><div class="side-logo-text">Finance</div><div class="side-logo-sub">Admin Panel</div></div>
  </div>
  <nav class="side-nav" id="side-nav"></nav>
  <div class="side-footer">
    <div class="side-total">
      <div class="side-total-label">ยอดรวมทั้งระบบ</div>
      <div class="side-total-val" id="side-total">—</div>
    </div>
    <a href="index.html" class="side-link">📱 หน้ามือถือ</a>
  </div>
</aside>

<main class="main" id="main"></main>

<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<script src="config.js"></script>
<script>
const ICONS={tuition:"🎓",expense:"💳",food:"🍜",transport:"🚌",rent:"🏠",book:"📚",health:"💊",saving:"💰",phone:"📱",clothes:"👕",entertainment:"🎬",other:"📦"};
const ICON_KEYS=Object.keys(ICONS);
const EMOJIS=["🎓","🔬","🏦","💼","📊","🎯","🌟","💎","🚀","🔥","💰","📚"];
const COLORS=["#6366F1","#10B981","#F59E0B","#EF4444","#06B6D4","#8B5CF6","#EC4899","#14B8A6"];
const uid=()=>"id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const dtFull=d=>new Date(d).toLocaleString("th-TH",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const MASK="••••••";

// PIN system
const PIN_MAP={"ป.โท":"498800","ป.เอก":"002304","โซล่าเซลล์":"001122","เงินสำรอง":"001122"};
function accPin(a){return PIN_MAP[a?.name||""];}
function accHasPin(a){return !!accPin(a);}
const UNLOCK_KEY="fin_unlocked_v1";
function loadUnlock(){try{return JSON.parse(sessionStorage.getItem(UNLOCK_KEY)||"{}");}catch{return {};}}
function saveUnlock(s){sessionStorage.setItem(UNLOCK_KEY,JSON.stringify(s));}
let unlockState=loadUnlock();
function isUnlocked(a){if(!a)return true;if(!accHasPin(a))return true;return !!unlockState[a.id];}
function setUnlocked(id,v){if(v)unlockState[id]=Date.now();else delete unlockState[id];saveUnlock(unlockState);}

const SCRIPT_URL=window.APP_CONFIG?.SCRIPT_URL||"https://script.google.com/macros/s/AKfycbwCUl1ypILZys1HkyqTj47fP1wMF_IcbuzqlJ9oMohMb1toc0M3v_fdPGjNrmLeJP1K/exec";
let data={accounts:[],history:[]};
let tab="overview",sel=0,txFilter="all",txSearch="";

// API
function showLoading(s){document.getElementById("loading").classList.toggle("show",s);}
let toastTimer;
function toast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;requestAnimationFrame(()=>t.classList.add("show"));clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2500);}

async function apiGet(action){
  if(!SCRIPT_URL||SCRIPT_URL.includes("YOUR_DEPLOYMENT"))throw new Error("กรุณาตั้งค่า Google Apps Script URL ในไฟล์ config.js");
  const r=await fetch(SCRIPT_URL+"?action="+action);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||"เกิดข้อผิดพลาด");
  return j;
}
async function apiPost(action,payload){
  if(!SCRIPT_URL||SCRIPT_URL.includes("YOUR_DEPLOYMENT"))throw new Error("กรุณาตั้งค่า Google Apps Script URL ในไฟล์ config.js");
  const r=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...payload})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||"เกิดข้อผิดพลาด");
  return j;
}
async function withApi(p,msg){
  showLoading(true);
  try{
    await p;
    const r=await apiGet("getAll");data=r.data;
    if(sel>=data.accounts.length)sel=Math.max(0,data.accounts.length-1);
    if(msg)toast(msg,"success");
    render();
  }catch(e){toast(e.message||"เกิดข้อผิดพลาด","error");}
  finally{showLoading(false);}
}

function acc(){return data.accounts[sel]||data.accounts[0];}
const accs=()=>data.accounts;
const hist=()=>data.history;

// Actions
const A={
  addAccount:()=>apiPost("addAccount",{data:{id:uid(),name:"บัญชี "+(accs().length+1),emoji:"💼",color:COLORS[accs().length%COLORS.length],balance:0}}),
  updateAccount:(id,u)=>apiPost("updateAccount",{data:{id,...u}}),
  deleteAccount:(id)=>apiPost("deleteAccount",{id}),
  deposit:(accountId,amount)=>apiPost("deposit",{data:{accountId,amount,historyId:uid(),note:"เพิ่มเงิน (Admin)"}}),
  addBox:(accountId,name,icon,amount)=>apiPost("addBox",{data:{id:uid(),accountId,name,icon,amount:amount||0}}),
  removeBox:(id)=>apiPost("deleteBox",{id}),
  transact:(boxId,type,amount,note)=>apiPost("transact",{data:{boxId,type,amount,note,historyId:uid()}}),
  deleteHistory:(id)=>apiPost("deleteHistory",{id}),
  resetData:()=>apiPost("resetData",{}),
};

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function render(){
  const tot=accs().reduce((s,a)=>s+a.balance,0);
  document.getElementById("side-total").textContent="฿"+fmt(tot);

  const TABS=[{k:"overview",i:"📊",l:"ภาพรวม"},{k:"accounts",i:"🏦",l:"บัญชี"},{k:"transactions",i:"📋",l:"รายการ"},{k:"settings",i:"⚙️",l:"ตั้งค่า"}];
  document.getElementById("side-nav").innerHTML=TABS.map(t=>`<button class="side-btn${tab===t.k?" active":""}" data-tab="${t.k}"><span class="side-icon">${t.i}</span>${t.l}</button>`).join("");
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{tab=el.dataset.tab;render();}));

  const m=document.getElementById("main");
  if(tab==="overview") m.innerHTML=renderOverview();
  else if(tab==="accounts") m.innerHTML=renderAccounts();
  else if(tab==="transactions") m.innerHTML=renderTransactions();
  else if(tab==="settings") m.innerHTML=renderSettings();
  m.classList.remove("fade");void m.offsetWidth;m.classList.add("fade");
  bind();
}

function renderOverview(){
  const visibleAccs=accs().filter(a=>isUnlocked(a));
  const tot=visibleAccs.reduce((s,a)=>s+a.balance,0);
  const visIds=new Set(visibleAccs.map(a=>a.id));
  const visHist=hist().filter(h=>visIds.has(h.accId));
  const deps=visHist.filter(h=>h.type==="deposit").reduce((s,h)=>s+h.amount,0);
  const wds=visHist.filter(h=>h.type==="withdraw").reduce((s,h)=>s+h.amount,0);
  const boxes=accs().reduce((s,a)=>s+a.boxes.length,0);
  const lockedCount=accs().filter(a=>!isUnlocked(a)).length;
  const recent=[...hist()].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);

  const statCards=[
    {l:"ยอดรวมทั้งระบบ",v:"฿"+fmt(tot)+(lockedCount?` <span style="font-size:11px;color:var(--muted)">(${lockedCount} ล็อก)</span>`:""),c:"#6366F1",i:"💰"},
    {l:"กล่องเงิน",v:boxes,c:"#10B981",i:"📦"},
    {l:"เงินเข้าสะสม",v:"฿"+fmt(deps),c:"#06B6D4",i:"📥"},
    {l:"เงินออกสะสม",v:"฿"+fmt(wds),c:"#EF4444",i:"📤"},
  ].map(s=>`<div class="stat">
    <div class="stat-deco" style="background:${s.c}"></div>
    <div class="stat-icon-sm" style="background:${s.c}1A;color:${s.c}">${s.i}</div>
    <div class="stat-label">${s.l}</div>
    <div class="stat-val" style="color:${s.c}">${s.v}</div>
  </div>`).join("");

let overlayEl;
function openModal(html){
  if(!overlayEl){overlayEl=document.createElement("div");overlayEl.className="overlay";overlayEl.innerHTML=`<div class="modal"></div>`;document.body.appendChild(overlayEl);overlayEl.addEventListener("click",e=>{if(e.target===overlayEl)closeModal();});}
  overlayEl.querySelector(".modal").innerHTML=html;
  requestAnimationFrame(()=>overlayEl.classList.add("open"));
}
function closeModal(){if(overlayEl)overlayEl.classList.remove("open");}

// PIN keypad modal
function askPin(account,opts={}){
  return new Promise(resolve=>{
    const correctPin=accPin(account);
    if(!correctPin){resolve(true);return;}
    const mode=opts.mode||"unlock";
    const title=opts.title||(mode==="unlock"?"ใส่รหัสเพื่อเปิดบัญชี":"ยืนยันด้วยรหัส");
    const sub=opts.sub||`${account.emoji||"🔒"} ${account.name}`;
    if(!overlayEl){overlayEl=document.createElement("div");overlayEl.className="overlay";document.body.appendChild(overlayEl);overlayEl.addEventListener("click",e=>{if(e.target===overlayEl){closeModal();resolve(false);}});}
    overlayEl.innerHTML=`<div class="pin-modal">
      <div class="pin-header">
        <div class="pin-acc-icon" style="background:${account.color}1A;color:${account.color}">${account.emoji||"🔒"}</div>
        <div class="pin-title">${title}</div>
        <div class="pin-sub">${sub}</div>
      </div>
      <div class="pin-dots" id="pin-dots">${[0,1,2,3,4,5].map(()=>`<div class="pin-dot"></div>`).join("")}</div>
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-pad" id="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-n="${n}">${n}</button>`).join("")}
        <button class="pin-key action" data-act="clear">ล้าง</button>
        <button class="pin-key" data-n="0">0</button>
        <button class="pin-key action danger" data-act="back">⌫</button>
      </div>
      <button class="pin-cancel" id="pin-cancel">ยกเลิก</button>
    </div>`;
    requestAnimationFrame(()=>overlayEl.classList.add("open"));
    let pin="";
    const dotsEl=document.getElementById("pin-dots"),errEl=document.getElementById("pin-error");
    function updateDots(){dotsEl.querySelectorAll(".pin-dot").forEach((d,i)=>{d.classList.remove("filled","error");if(i<pin.length)d.classList.add("filled");});}
    function shakeError(msg){errEl.textContent=msg;dotsEl.querySelectorAll(".pin-dot").forEach(d=>d.classList.add("error"));setTimeout(()=>{pin="";updateDots();errEl.textContent="";},900);}
    document.getElementById("pin-pad").addEventListener("click",e=>{
      const k=e.target.closest("[data-n],[data-act]");if(!k)return;
      if(k.dataset.act==="clear"){pin="";updateDots();errEl.textContent="";return;}
      if(k.dataset.act==="back"){pin=pin.slice(0,-1);updateDots();errEl.textContent="";return;}
      if(pin.length>=6)return;
      pin+=k.dataset.n;updateDots();
      if(pin.length===6){
        setTimeout(()=>{
          if(pin===correctPin){if(mode==="unlock")setUnlocked(account.id,true);closeModal();resolve(true);}
          else shakeError("รหัสไม่ถูกต้อง");
        },150);
      }
    });
    document.getElementById("pin-cancel").addEventListener("click",()=>{closeModal();resolve(false);});
    // Keyboard support
    const keyHandler=e=>{
      if(e.key>="0"&&e.key<="9"&&pin.length<6){pin+=e.key;updateDots();if(pin.length===6){setTimeout(()=>{if(pin===correctPin){if(mode==="unlock")setUnlocked(account.id,true);document.removeEventListener("keydown",keyHandler);closeModal();resolve(true);}else shakeError("รหัสไม่ถูกต้อง");},150);}}
      else if(e.key==="Backspace"){pin=pin.slice(0,-1);updateDots();errEl.textContent="";}
      else if(e.key==="Escape"){document.removeEventListener("keydown",keyHandler);closeModal();resolve(false);}
    };
    document.addEventListener("keydown",keyHandler);
  });
}

async function withPinConfirm(account,actionLabel,apiCall,successMsg){
  const ok=await askPin(account,{title:"ยืนยันรายการ",sub:`${actionLabel} • ${account.name}`,mode:"confirm"});
  if(!ok){toast("ยกเลิกรายการ","error");return;}
  withApi(apiCall,successMsg);
}

function bind(){
  document.querySelectorAll("[data-sel]").forEach(el=>el.addEventListener("click",()=>{sel=parseInt(el.dataset.sel);render();}));

  // Lock toggle
  document.querySelectorAll("[data-toggle-lock]").forEach(el=>el.addEventListener("click",async e=>{
    e.stopPropagation();
    const id=el.dataset.toggleLock;
    const target=accs().find(x=>x.id===id);if(!target)return;
    if(isUnlocked(target)){setUnlocked(id,false);toast("ล็อกบัญชีแล้ว","success");render();}
    else{const ok=await askPin(target,{mode:"unlock"});if(ok){toast("ปลดล็อกสำเร็จ","success");render();}}
  }));

  document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",async()=>{
    const a=el.dataset.action;
    if(a==="addAccount"){withApi(A.addAccount(),"สร้างบัญชีแล้ว").then(()=>{sel=accs().length-1;render();});return;}
    if(a==="editAcc"){
      const cur=acc();
      if(!isUnlocked(cur)){const ok=await askPin(cur,{mode:"unlock"});if(!ok)return;render();return;}
      openEditAcc();
    }
  }));

  document.querySelectorAll("[data-rmbox]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("ลบกล่องนี้? ยอดเงินจะคืนสู่บัญชี"))return;
    const cur=acc();const box=cur.boxes.find(b=>b.id===el.dataset.rmbox);
    await withPinConfirm(cur,`ลบกล่อง "${box?.name||""}"`,A.removeBox(el.dataset.rmbox),"ลบกล่องแล้ว");
  }));

  document.querySelectorAll("[data-delacc]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("ลบบัญชีนี้? กล่องและประวัติทั้งหมดจะถูกลบด้วย"))return;
    const cur=acc();
    await withPinConfirm(cur,`ลบบัญชี "${cur.name}"`,A.deleteAccount(cur.id),"ลบบัญชีแล้ว");
    sel=0;render();
  }));

  document.querySelectorAll("[data-delhist]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("ลบรายการนี้?"))return;
    // Find which account this history belongs to
    const h=hist().find(x=>x.id===el.dataset.delhist);
    const a=accs().find(x=>x.id===h?.accId);
    if(a&&accHasPin(a)){
      await withPinConfirm(a,"ลบประวัติรายการ",A.deleteHistory(el.dataset.delhist),"ลบรายการแล้ว");
    }else{
      withApi(A.deleteHistory(el.dataset.delhist),"ลบรายการแล้ว");
    }
  }));

  document.querySelectorAll("[data-filter]").forEach(el=>el.addEventListener("click",()=>{txFilter=el.dataset.filter;render();}));

  // Search (preserve focus)
  const sEl=document.getElementById("f-search");
  if(sEl){
    sEl.addEventListener("input",e=>{
      txSearch=e.target.value;
      render();
      setTimeout(()=>{const el=document.getElementById("f-search");if(el){el.focus();el.setSelectionRange(txSearch.length,txSearch.length);}},0);
    });
  }

  // Deposit
  document.getElementById("f-dep-btn")?.addEventListener("click",async()=>{
    const v=Number(document.getElementById("f-dep-amt")?.value);
    if(v<=0)return;
    const cur=acc();
    await withPinConfirm(cur,`เพิ่มเงิน ฿${fmt(v)}`,A.deposit(cur.id,v),"เพิ่มเงินแล้ว");
  });

  // Add box
  let selIcon="saving";
  document.getElementById("f-box-icons")?.addEventListener("click",e=>{
    const b=e.target.closest("[data-bicon]");if(!b)return;selIcon=b.dataset.bicon;
    document.querySelectorAll("[data-bicon]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
  });
  document.getElementById("f-box-btn")?.addEventListener("click",async()=>{
    const name=document.getElementById("f-box-name")?.value.trim();
    if(!name)return;
    const amt=Number(document.getElementById("f-box-amt")?.value)||0;
    const cur=acc();
    await withPinConfirm(cur,`สร้างกล่อง "${name}"`,A.addBox(cur.id,name,selIcon,amt),"สร้างกล่องแล้ว");
  });

  // Transact
  let txType="withdraw";
  document.getElementById("f-tx-tabs")?.addEventListener("click",e=>{
    const b=e.target.closest("[data-txtype]");if(!b)return;txType=b.dataset.txtype;
    document.querySelectorAll("[data-txtype]").forEach(x=>{x.classList.remove("active");x.style.background="transparent";});
    b.classList.add("active");
    b.style.background=txType==="withdraw"?"var(--danger)":"var(--success)";
    const btn=document.getElementById("f-tx-btn");if(btn){btn.textContent=txType==="withdraw"?"ถอนเงิน":"ฝากเงิน";btn.style.background=txType==="withdraw"?"var(--danger)":"var(--success)";}
  });
  document.getElementById("f-tx-btn")?.addEventListener("click",async()=>{
    const bid=document.getElementById("f-tx-box")?.value;
    const amt=Number(document.getElementById("f-tx-amt")?.value);
    const note=document.getElementById("f-tx-note")?.value.trim()||"";
    if(!bid||amt<=0)return;
    const cur=acc();
    const box=cur.boxes.find(b=>b.id===bid);
    const label=txType==="withdraw"?`ถอน ฿${fmt(amt)} จาก ${box?.name||""}`:`เพิ่ม ฿${fmt(amt)} ใน ${box?.name||""}`;
    await withPinConfirm(cur,label,A.transact(bid,txType,amt,note),txType==="withdraw"?"ถอนสำเร็จ":"ฝากสำเร็จ");
  });

  // Settings buttons
  document.getElementById("btn-json")?.addEventListener("click",()=>{
    const d=JSON.stringify(data,null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="finance-backup.json";a.click();URL.revokeObjectURL(u);
  });
  document.getElementById("btn-csv")?.addEventListener("click",()=>{
    const h="วันที่,บัญชี,ประเภท,จำนวน,หมายเหตุ\n";
    const r=hist().map(x=>{const a=accs().find(y=>y.id===x.accId);return`${new Date(x.date).toISOString()},${a?.name||""},${x.type==="deposit"?"เงินเข้า":"เงินออก"},${x.amount},"${x.note||""}"`;}).join("\n");
    const b=new Blob(["\uFEFF"+h+r],{type:"text/csv;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="finance-history.csv";a.click();URL.revokeObjectURL(u);
  });
  document.getElementById("btn-reset")?.addEventListener("click",()=>{
    if(confirm("⚠️ ยืนยันรีเซ็ตข้อมูลทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้"))withApi(A.resetData(),"รีเซ็ตเรียบร้อย");
  });
}

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:left;margin-top:20px;font-size:13px;line-height:1.8;color:var(--text-2)">
      <strong style="color:var(--text)">ขั้นตอน:</strong><br>

  try{
    const r=await apiGet("getAll");
    data=r.data;

    render();
